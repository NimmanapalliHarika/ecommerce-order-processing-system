eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/

jwt:
  secret: 6d8c2f0a9b4e7d1c5f8a3b6e9d2f7a1c8e4b5d9f6a2c7e1b4d8f3a6c9e2f5b1
